<!DOCTYPE html>
<html>
  <head>
    <title>Tracking</title>

    <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="./images/korina_images/hero,tital and favicon/favicon.png" type="image/x-icon">
      
    <!-- Open Graph meta tags -->
  <meta property="og:title" content="Korina Fashion">
  <meta property="og:description" content="Shop the latest trends in fashion at Korina Fashion. Discover top collections now!">
  <meta property="og:image" content="https://abhishekganvir.github.io/fwd-ecommerce-product-showcase/images/korina_images/hero,tital and favicon/live_preview.png">
  <meta property="og:url" content="https://abhishekganvir.github.io/fwd-ecommerce-product-showcase/">
  <meta property="og:type" content="website">
   
<!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/amazon-header.css">
    <link rel="stylesheet" href="styles/pages/tracking.css">
  </head>
  <body>
  <div class="amazon-header">
      <div title="Home" class="amazon-header-left-section">
        <a href="index.html" class="header-link">
          <img class="amazon-logo"
            src="images/korina_images/hero,tital and favicon/header-title.png">
          <img class="amazon-mobile-logo"
            src="images/korina_images/hero,tital and favicon/favicon.png">
        </a>
      </div>

      

      <div title="Orders" class="cart-link header-link">
        <a class="order-icon" href="orders.html">
          <div class="order-return">
              <img  src="./images/delivery.svg" alt="Orders" >
          </div>
          
         
        </a>

        <a title="Cart" class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity js-cart-quantity">3</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>

    <div class="main">
      <div class="order-tracking js-order-track">
        <a class="back-to-orders-link link-primary" href="orders.html">
          View all orders
        </a>

        <div class="delivery-date">
          Arriving on Monday, June 13
        </div>

        <div class="product-info">
          Black and Gray Athletic Cotton Socks - 6 Pairs
        </div>

        <div class="product-info">
          Quantity: 1
        </div>

        <img class="product-image" src="images/products/athletic-cotton-socks-6-pairs.jpg">

        <div class="progress-labels-container">
          <div class="progress-label">
            Preparing
          </div>
          <div class="progress-label current-status">
            Shipped
          </div>
          <div class="progress-label">
            Delivered
          </div>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./scripts/tracking.js"></script>
  </body>
</html>
